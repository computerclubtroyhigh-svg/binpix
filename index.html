<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINPIX — Binary Pixel Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #10101a;
    --border: #1e1e30;
    --accent: #00ff9d;
    --accent2: #ff3c6e;
    --text: #c8c8e0;
    --dim: #44445a;
    --pixel-size: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,157,0.015) 2px,
      rgba(0,255,157,0.015) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .everything { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 28px; }

  header { text-align: center; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 80px);
    letter-spacing: 8px;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,255,157,0.4), 0 0 60px rgba(0,255,157,0.1);
    line-height: 1;
  }
  header p {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .workspace {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* GRID */
  .grid-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 16px;
    position: relative;
  }
  .grid-wrap::before {
    content: 'CANVAS';
    position: absolute;
    top: -10px; left: 16px;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
    background: var(--panel);
    padding: 0 6px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(8, var(--pixel-size));
    grid-template-rows: repeat(8, var(--pixel-size));
    gap: 2px;
  }

  .pixel {
    width: var(--pixel-size);
    height: var(--pixel-size);
    background: #111118;
    border: 1px solid #1a1a28;
    cursor: pointer;
    transition: transform 0.08s, border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .pixel:hover {
    border-color: var(--accent);
    transform: scale(1.05);
    z-index: 2;
    box-shadow: 0 0 12px rgba(0,255,157,0.3);
  }
  .pixel.selected {
    border-color: var(--accent2) !important;
    box-shadow: 0 0 16px rgba(255,60,110,0.5) !important;
    animation: pulse-sel 1.2s ease-in-out infinite;
  }
  @keyframes pulse-sel {
    0%,100% { box-shadow: 0 0 16px rgba(255,60,110,0.5); }
    50% { box-shadow: 0 0 28px rgba(255,60,110,0.8); }
  }

  .pixel .coords {
    position: absolute;
    bottom: 3px; right: 4px;
    font-size: 7px;
    color: rgba(255,255,255,0.15);
    pointer-events: none;
    line-height: 1;
  }

  /* SIDE PANEL */
  .panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 260px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
  }
  .card-title {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  /* Selected pixel preview */
  #preview-box {
    width: 100%;
    height: 80px;
    background: #111118;
    border: 1px solid var(--border);
    margin-bottom: 10px;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--dim);
  }
  #preview-coords {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  #preview-hex {
    font-size: 11px;
    color: var(--dim);
  }

  /* Binary input */
  .binary-section label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    display: block;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .bit-row {
    display: flex;
    gap: 4px;
    margin-bottom: 6px;
    align-items: center;
  }
  .bit-label {
    font-size: 8px;
    color: var(--dim);
    width: 22px;
    flex-shrink: 0;
  }
  .bit-inputs {
    display: flex;
    gap: 3px;
  }
  .bit-inputs input {
    width: 24px;
    height: 30px;
    background: #0a0a14;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .bit-inputs input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0,255,157,0.2);
  }
  .bit-inputs input.invalid {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .bit-sep {
    font-size: 10px;
    color: var(--border);
    align-self: center;
  }

  .hex-display {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--dim);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .hex-display span:last-child { color: var(--text); }

  .btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
    margin-top: 12px;
  }
  .btn:hover {
    background: rgba(0,255,157,0.08);
    box-shadow: 0 0 20px rgba(0,255,157,0.2);
  }
  .btn:active { transform: scale(0.98); }
  .btn.danger {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn.danger:hover {
    background: rgba(255,60,110,0.08);
    box-shadow: 0 0 20px rgba(255,60,110,0.2);
  }
  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Status bar */
  .status {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-align: center;
    min-height: 16px;
  }
  .status.ok { color: var(--accent); }
  .status.err { color: var(--accent2); }

  /* instructions */
  .instructions {
    font-size: 10px;
    color: var(--dim);
    line-height: 1.8;
    letter-spacing: 1px;
  }
  .instructions span { color: var(--accent); }
</style>
</head>
<body>
<div class="everything">
  <div class="workspace">
    <!-- GRID -->
    <div class="grid-wrap">
      <div id="grid"></div>
    </div>

    <!-- PANEL -->
    <div class="panel">

      <div class="card">
        <div class="card-title">Selected Pixel</div>
        <div id="preview-box">no selection</div>
        <div id="preview-coords">—</div>
        <div id="preview-hex">HEX: #------</div>
      </div>

      <div class="card">
        <div class="card-title">Binary Color Input</div>
        <div class="binary-section">
          <div class="bit-row">
            <span class="bit-label">R</span>
            <div class="bit-inputs" id="bits-r"></div>
          </div>
          <div class="bit-row">
            <span class="bit-label">G</span>
            <div class="bit-inputs" id="bits-g"></div>
          </div>
          <div class="bit-row">
            <span class="bit-label">B</span>
            <div class="bit-inputs" id="bits-b"></div>
          </div>
        </div>
        <div class="hex-display">
          <span>DECODED</span>
          <span id="decoded-hex">#000000</span>
        </div>
        <div id="color-preview-strip" style="height:8px;margin-top:8px;background:#000;transition:background 0.15s;"></div>
        <button class="btn" id="apply-btn" disabled>Apply Color</button>
        <div class="status" id="status-msg"></div>
      </div>

      <div class="card">
        <div class="card-title">Actions</div>
        <button class="btn danger" id="clear-btn">Clear All</button>
        <div class="instructions" style="margin-top:14px;">
          <span>01</span> Click any pixel to select<br>
          <span>02</span> Enter 8-bit binary per channel<br>
          <span>03</span> Press Apply or Enter<br>
          <span>04</span> Valid chars: <span>0</span> or <span>1</span> only
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const GRID_SIZE = 8;
const grid = document.getElementById('grid');
const pixels = [];
let selectedPixel = null;

// Build grid
for (let r = 0; r < GRID_SIZE; r++) {
  pixels[r] = [];
  for (let c = 0; c < GRID_SIZE; c++) {
    const px = document.createElement('div');
    px.className = 'pixel';
    px.dataset.r = r;
    px.dataset.c = c;
    px.innerHTML = `<span class="coords">${c},${r}</span>`;
    px.style.background = '#111118';
    px._color = '#111118';
    px.addEventListener('click', () => selectPixel(px, r, c));
    grid.appendChild(px);
    pixels[r][c] = px;
  }
}

// Build bit inputs
function buildBitInputs(containerId, channel) {
  const container = document.getElementById(containerId);
  for (let i = 0; i < 8; i++) {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.maxLength = 1;
    inp.value = '0';
    inp.dataset.channel = channel;
    inp.dataset.bit = i;
    inp.addEventListener('input', handleBitInput.bind(null, inp));
    inp.addEventListener('keydown', handleBitKeydown.bind(null, inp));
    container.appendChild(inp);
    if (i === 3) {
      const sep = document.createElement('span');
      sep.className = 'bit-sep';
      sep.textContent = '·';
      container.appendChild(sep);
    }
  }
}
buildBitInputs('bits-r', 'r');
buildBitInputs('bits-g', 'g');
buildBitInputs('bits-b', 'b');

function getAllBitInputs(channel) {
  return document.querySelectorAll(`[data-channel="${channel}"]`);
}

function handleBitInput(inp) {
  const val = inp.value;
  if (val !== '0' && val !== '1') {
    inp.classList.add('invalid');
    inp.value = '';
  } else {
    inp.classList.remove('invalid');
    // Auto-advance
    const allInRow = [...document.querySelectorAll(`[data-channel="${inp.dataset.channel}"]`)];
    const idx = allInRow.indexOf(inp);
    if (idx < allInRow.length - 1) allInRow[idx + 1].focus();
    else {
      // move to next channel
      const next = { r: 'g', g: 'b', b: null };
      const nc = next[inp.dataset.channel];
      if (nc) document.querySelector(`[data-channel="${nc}"]`).focus();
    }
  }
  updateDecoded();
}

function handleBitKeydown(inp, e) {
  if (e.key === 'Backspace' && inp.value === '') {
    const allInRow = [...document.querySelectorAll(`[data-channel="${inp.dataset.channel}"]`)];
    const idx = allInRow.indexOf(inp);
    if (idx > 0) { allInRow[idx-1].focus(); e.preventDefault(); }
  }
  if (e.key === 'Enter') applyColor();
}

function getBitValue(channel) {
  const inputs = getAllBitInputs(channel);
  let str = '';
  inputs.forEach(i => { str += (i.value === '1') ? '1' : '0'; });
  return parseInt(str, 2);
}

function getBitString(channel) {
  const inputs = getAllBitInputs(channel);
  let str = '';
  inputs.forEach(i => { str += (i.value === '1') ? '1' : '0'; });
  return str;
}

function updateDecoded() {
  const r = getBitValue('r');
  const g = getBitValue('g');
  const b = getBitValue('b');
  const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
  document.getElementById('decoded-hex').textContent = hex;
  document.getElementById('color-preview-strip').style.background = hex;
}

function selectPixel(px, r, c) {
  // deselect old
  if (selectedPixel) selectedPixel.classList.remove('selected');
  selectedPixel = px;
  px.classList.add('selected');

  // update panel
  document.getElementById('preview-box').style.background = px._color;
  document.getElementById('preview-box').textContent = '';
  document.getElementById('preview-coords').textContent = `COL ${c}  ROW ${r}`;
  document.getElementById('preview-hex').textContent = `HEX: ${px._color.toUpperCase()}`;
  document.getElementById('apply-btn').disabled = false;
  setStatus('', '');

  // Load current color into bit inputs
  const hexColor = px._color;
  let rVal, gVal, bVal;
  if (hexColor.length === 7) {
    rVal = parseInt(hexColor.slice(1,3), 16);
    gVal = parseInt(hexColor.slice(3,5), 16);
    bVal = parseInt(hexColor.slice(5,7), 16);
  } else {
    rVal = 0; gVal = 0; bVal = 0;
  }
  setChannel('r', rVal);
  setChannel('g', gVal);
  setChannel('b', bVal);
  updateDecoded();
}

function setChannel(channel, value) {
  const bits = value.toString(2).padStart(8,'0');
  const inputs = getAllBitInputs(channel);
  inputs.forEach((inp, i) => {
    inp.value = bits[i];
    inp.classList.remove('invalid');
  });
}

function applyColor() {
  if (!selectedPixel) return;
  const r = getBitValue('r');
  const g = getBitValue('g');
  const b = getBitValue('b');
  const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
  selectedPixel.style.background = hex;
  selectedPixel._color = hex;
  document.getElementById('preview-box').style.background = hex;
  document.getElementById('preview-hex').textContent = `HEX: ${hex.toUpperCase()}`;
  setStatus(`Applied ${hex.toUpperCase()}`, 'ok');
}

function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status ' + type;
}

document.getElementById('apply-btn').addEventListener('click', applyColor);

document.getElementById('clear-btn').addEventListener('click', () => {
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      pixels[r][c].style.background = '#111118';
      pixels[r][c]._color = '#111118';
    }
  }
  if (selectedPixel) {
    document.getElementById('preview-box').style.background = '#111118';
    document.getElementById('preview-hex').textContent = 'HEX: #111118';
  }
  setStatus('Canvas cleared', 'ok');
});

updateDecoded();
</script>
</body>
</html>
